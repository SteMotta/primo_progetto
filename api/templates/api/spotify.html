{% extends "base.html"%}

{% block title%} {{block.super}} | Spotify {% endblock title%}

{% block content%}
    <h1>Brani</h1>

    {% if results %}
        <ul>
            {% for brano, img in results %}
                <li>
                    <p>{{ brano }}</p>
                    <img src="{{ img }}" width="250" height="auto" alt="Copertina Album">
                </li>
                <br>
            {% endfor %}
        </ul>
    {% endif %}
{% endblock content%}
